name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle, DMG, and zip
        run: ./build-app.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            build/Sidekick.dmg \
            build/Sidekick.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
