name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build app bundle, DMG, and zip
        run: ./build-app.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Releases are usually created by hand first (curated notes from
          # CHANGELOG.md) before this build finishes, so an existing release
          # keeps its notes and just gets the CI-built assets attached.
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              build/Sidekick.dmg \
              build/Sidekick.zip \
              --clobber
            exit 0
          fi
          # First tag ever gets a short static note instead of a
          # --generate-notes dump of the entire commit history (there's no
          # prior release to diff against). Later tags diff normally.
          if [ "$(git tag --list 'v*' | wc -l | tr -d ' ')" -le 1 ]; then
            NOTES_ARGS=(--notes "Initial release.")
          else
            NOTES_ARGS=(--generate-notes)
          fi
          gh release create "${{ github.ref_name }}" \
            build/Sidekick.dmg \
            build/Sidekick.zip \
            --title "${{ github.ref_name }}" \
            "${NOTES_ARGS[@]}"
